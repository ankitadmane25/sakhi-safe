<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sakhi Safe - Premium</title>
    <!-- Use Outfit font for a premium look -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Background Orbs for Glassmorphism Effect -->
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- App Container -->
    <div id="app-container">

        <!-- ========================================== -->
        <!-- Auth / Login Section -->
        <!-- ========================================== -->
        <section id="auth-section" class="active-section">
            <div class="glass-card login-card">
                <div class="brand-header">
                    <span class="logo-icon">🌸</span>
                    <h1>Sakhi Safe</h1>
                    <p class="tagline">Your personal safety companion</p>
                </div>

                <div class="form-container">
                    <div class="input-group">
                        <label for="userName">Full Name</label>
                        <input type="text" id="userName" placeholder="Enter your full name">
                    </div>

                    <div class="input-group">
                        <label for="userPhone">Phone Number</label>
                        <input type="tel" id="userPhone" placeholder="Enter your phone (+91...)">
                    </div>

                    <div class="input-group">
                        <label for="userLanguage">Alert Message Language</label>
                        <select id="userLanguage">
                            <option value="English">English</option>
                            <option value="Hindi">Hindi (हिंदी)</option>
                            <option value="Marathi">Marathi (मराठी)</option>
                        </select>
                    </div>

                    <button id="loginBtn" class="primary-btn pulse-hover">Enter Securely</button>
                </div>
            </div>
        </section>

        <!-- ========================================== -->
        <!-- Main Dashboard Section -->
        <!-- ========================================== -->
        <section id="main-section" class="hidden">
            <header class="glass-header">
                <div class="header-brand">
                    <span class="logo-icon-small">🌸</span>
                    <h2>Sakhi Safe</h2>
                </div>
                <button id="logoutBtn" class="text-btn outline-btn">Logout</button>
            </header>

            <div class="main-content">
                <!-- Status Profile Card -->
                <div class="glass-card status-card">
                    <p class="greeting">Welcome, <span id="display-name" class="highlight-text">User</span>!</p>
                    <p class="subtitle">Shake phone or press the SOS button to send an alert</p>

                    <button id="enableShakeBtn" class="primary-btn shake-auth-btn hidden">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2v20" />
                            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
                        </svg>
                        Allow Shake Detection
                    </button>

                    <div id="location-status" class="status-indicator"></div>
                </div>

                <!-- Giant SOS Button -->
                <div class="sos-container">
                    <button id="sosBtn" class="sos-btn premium-shadow">
                        <span class="sos-text">SOS</span>
                        <div class="ripple"></div>
                    </button>
                </div>

                <!-- Contacts Section -->
                <div class="glass-card contacts-section">
                    <div class="contacts-header">
                        <h3>Trusted Contacts</h3>
                    </div>

                    <div id="contacts-list" class="contacts-list">
                        <!-- Contact Cards render dynamically here -->
                    </div>

                    <div class="add-contact-form">
                        <input type="tel" id="newContactPhone" placeholder="Contact Phone (+91...)">
                        <button id="addContactBtn" class="secondary-btn add-btn">+</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- ========================================== -->
        <!-- Countdown Modal (Emergency Mode) -->
        <!-- ========================================== -->
        <div id="countdown-modal" class="hidden glass-modal">
            <div class="modal-content glass-card premium-alert">
                <h2 class="alert-title">🚨 SOS Triggered! 🚨</h2>
                <p>Sending alert and precise location to contacts in:</p>
                <div id="countdown-timer" class="timer-text">5</div>
                <button id="cancelSosBtn" class="cancel-btn">Cancel Alert</button>
            </div>
        </div>

    </div>

    <!-- ========================================== -->
    <!-- Custom Toast Notifications Container -->
    <!-- ========================================== -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Alarm Sound -->
    <audio id="sirenSound" src="https://actions.google.com/sounds/v1/alarms/spaceship_alarm.ogg" preload="auto"></audio>

    <!-- App Logic -->
    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="script.js"></script>
</body>

</html>
